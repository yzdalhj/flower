# AI Companion Bot 配置文件示例

# AI服务提供商配置
ai_providers:
  openai:
    api_key: "your-openai-api-key-here"
    endpoint: "https://api.openai.com/v1"
    model: "gpt-3.5-turbo"
    parameters:
      temperature: 0.7
      max_tokens: 1000
  
  claude:
    api_key: "your-claude-api-key-here"
    model: "claude-3-sonnet-20240229"
    parameters:
      temperature: 0.7
      max_tokens: 1000
  
  wenxin:
    api_key: "your-wenxin-api-key-here"
    endpoint: "https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat"
    model: "ernie-bot"

# 平台配置
platforms:
  wechat:
    connection_type: "client_control"  # web_api, client_control, protocol_simulation
    enabled: true
    config:
      puppet: "wechaty-puppet-wechat"
      # 其他Wechaty配置
  
  qq:
    connection_type: "client_control"
    enabled: true
    config:
      host: "localhost"
      port: 3000
      access_token: "your-napcat-token"

# 性格配置
personality_profiles:
  default:
    personality: "lively"  # lively, gentle, humorous, serious, intellectual
    role: "friend"  # friend, assistant, mentor, listener
    gender: "female"  # male, female, neutral
    traits:
      friendliness: 0.8
      humor: 0.7
      empathy: 0.9
  
  assistant:
    personality: "intellectual"
    role: "assistant"
    gender: "neutral"
    traits:
      professionalism: 0.9
      helpfulness: 0.95
      patience: 0.85

# 数据库配置
database:
  host: "localhost"
  port: 5432
  database: "ai_companion_bot"
  username: "postgres"
  password: "your-password-here"
  pool_size: 10

# Redis配置
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null

# 系统配置
system:
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: "logs/app.log"
  data_retention_days: 30
  max_concurrent_conversations: 10
